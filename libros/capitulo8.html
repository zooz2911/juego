<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capítulo 1 - Historia Denominacional</title>
    <link rel="stylesheet" href="../css/capitulos.css">
</head>
<body>
    <div id="game" class="game-container">
        <!-- SECCIÓN DEL TÍTULO PRINCIPAL -->
        <div class="title-section">
            <h1 class="main-title">HISTORIA DENOMINACIONAL</h1>
            <div class="sub-title" id="chapterTitle">Capítulo 1: La Iglesia Cristiana a Través de las Edades</div>
        </div>

        <!-- HEADER DE NAVEGACIÓN -->
        <div class="game-header">
            <button class="back-btn" onclick="backToMenu()">← Volver al Menú</button>
            <span class="chapter-number" id="questionCounter">Pregunta 1/72</span>
            <span class="question-type-badge" id="questionType">Selección Simple</span>
        </div>

        <!-- ESTADÍSTICAS EN VIVO -->
        <div class="score-stats">
            <div class="score-stats-item">
                <span class="score-stats-label">✅ Correctas:</span>
                <span class="score-stats-value correct" id="correctCount">0</span>
            </div>
            <div class="score-stats-item">
                <span class="score-stats-label">❌ Incorrectas:</span>
                <span class="score-stats-value incorrect" id="incorrectCount">0</span>
            </div>
        </div>

        <!-- PREGUNTA -->
        <div id="questionText" class="question-text"></div>

        <!-- CONTENEDORES DE PREGUNTAS - TODOS VACÍOS -->
        <div id="multipleChoiceContainer" class="options-container hidden"></div>
        <div id="fillBlankContainer" class="fill-container hidden"></div>

        <div id="matchingContainer" class="matching-container hidden">
            <div class="matching-left">
                <h3>📌 CONCEPTOS</h3>
                <div id="matchingLeft"></div>
            </div>
            <div class="matching-right">
                <h3>🔗 DEFINICIONES</h3>
                <div id="matchingRight"></div>
            </div>
        </div>

        <!-- BOTONES -->
        <button id="submitBtn" class="submit-btn" onclick="submitAnswer()">✓ COMPROBAR RESPUESTA</button>
        <div id="resultMessage" class="result-message hidden"></div>
        <button id="nextBtn" class="next-btn hidden" onclick="nextQuestion()">SIGUIENTE PREGUNTA →</button>

        <!-- RESULTADOS FINALES -->
        <div id="finalResults" class="hidden"></div>

        <!-- BARRA DE PROGRESO -->
        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            <div class="progress-text" id="progressText">Progreso: 0 de 72</div>
        </div>
    </div>

    <script src="../js/capitulo8.js"></script>
</body>
</html>
